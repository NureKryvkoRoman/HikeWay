services:
  keycloak:
    container_name: hikeway-keycloak
    image: quay.io/keycloak/keycloak:latest
    command:
    - start-dev
    - --import-realm
    ports:
    - 8081:8080
    volumes:
    - ./keycloak/:/opt/keycloak/data/import/
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: 1234
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
  db:
    container_name: hikeway-postgres
    image: postgis/postgis:18-3.6
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: hikeway
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hikewaydb
    volumes:
      - ./pgdata:/var/lib/postgresql
  minio:
    container_name: hikeway-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: hikeway
      MINIO_ROOT_PASSWORD: hikeway-secret
    volumes:
      - ./minio-data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 hikeway hikeway-secret; do sleep 1; done;
        mc mb --ignore-existing local/poi-photos;
        mc anonymous set download local/poi-photos;
