services:
  keycloak:
    container_name: hikeway-keycloak
    image: quay.io/keycloak/keycloak:latest
    command:
    - start-dev
    - --import-realm
    ports:
    - 8081:8080
    volumes:
    - ./keycloak/:/opt/keycloak/data/import/
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: 1234
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
  db:
    container_name: hikeway-postgres
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: hikeway
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hikewaydb
    volumes:
      - ./pgdata:/var/lib/postgresql
