spring.application.name=hikeway
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/hikeway-keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/hikeway-keycloak/protocol/openid-connect/certs
keycloak.server-url=http://localhost:8081
keycloak.realm=master
keycloak.target-realm=hikeway-keycloak
keycloak.client-id=admin-cli
keycloak.username=admin
keycloak.password=1234

spring.datasource.url=jdbc:postgresql://localhost:5432/hikewaydb
spring.datasource.username=hikeway
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

hikeway.poi.storage.endpoint=${POI_STORAGE_ENDPOINT:http://localhost:9000}
hikeway.poi.storage.region=${POI_STORAGE_REGION:us-east-1}
hikeway.poi.storage.access-key=${POI_STORAGE_ACCESS_KEY:hikeway}
hikeway.poi.storage.secret-key=${POI_STORAGE_SECRET_KEY:hikeway-secret}
hikeway.poi.storage.bucket=${POI_STORAGE_BUCKET:poi-photos}
hikeway.poi.storage.public-base-url=${POI_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/poi-photos}
hikeway.poi.storage.upload-expiry=15m
#spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect
